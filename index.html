<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portafolio de Rodrigo</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  
</head>
<body id="background">
  <header>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Inicio</a></li>
        <li><a href="#proyectos">Proyectos</a></li>
        <li><a href="#sobremi">Sobre mí</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <div class="intro">
      <h1>HEY, SOY RODRIGO</h1>
      <p>Soy diseñador gráfico, UX/UI designer y desarrollador front-end</p>
      <div class="buttons">
        <a href="#proyectos" class="btn">→ Ver mis proyectos</a>
        <a href="#sobremi" class="btn alt">→ Más sobre mí</a>
      </div>
    </div>
  </section>

  <!-- Scripts para fondo animado -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
  <script>
    VANTA.WAVES({
      el: "#background",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.0,
      scaleMobile: 1.0,
      color: 0xffffff,
      shininess: 50.00,
      waveHeight: 20.00,
      waveSpeed: 1.00,
      zoom: 0.85
    })
  </script>
</body>
</html>
